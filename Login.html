<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SIMS</title>
    <link rel="stylesheet" href="css/style1.css">
</head>
<body>

<main class="auth-container">
    <section class="auth-card">
        <header>
            <h1>SIMS</h1>
            <p>User Login</p>
        </header>

        <fieldset>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input class="type-bar" type="email" id="loginEmail" placeholder="Enter your Email Address">
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input class="type-bar" type="password" id="loginPassword" placeholder="Enter your Password">
            </div>

            <button type="submit" class="btn-primary">Login</button>
            <p id="loginMessage" class="message"></p>

            <p class="redirect">
                No account?
                <a class="hyper-link" href="register.html">Register</a>
            </p>
        </form>

        </fieldset>
    </section>
</main>

<script src="js/auth.js"></script>
</body>
</html>
